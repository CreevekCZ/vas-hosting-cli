name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar -czf vash-v${VERSION}-darwin-arm64.tar.gz -C .build/release vash
          echo "ARCHIVE=vash-v${VERSION}-darwin-arm64.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: ${{ env.ARCHIVE }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"

      - name: Build release binary
        run: swift build -c release

      - name: Create archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar -czf vash-v${VERSION}-linux-x86_64.tar.gz -C .build/release vash
          echo "ARCHIVE=vash-v${VERSION}-linux-x86_64.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: ${{ env.ARCHIVE }}

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true

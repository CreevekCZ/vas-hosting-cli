excluded:
  - .build
  - Sources/VasHostingClient

identifier_name:
  min_length:
    warning: 1
    error: 1

line_length:
  warning: 150
  error: 200
  ignores_urls: true
  ignores_comments: true

trailing_comma:
  mandatory_comma: true

file_length:
  warning: 500
  error: 600

type_body_length:
  warning: 400
  error: 500

disabled_rules:
  - non_optional_string_data_conversion

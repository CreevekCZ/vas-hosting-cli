  /api/v1/servers/{serverHostname}/install-vps:
    post:
      tags:
        - Servers
      summary: Install VPS on VDS
      description: >-
        Allows to install VPS (Virtual Private Server) on VDS (Virtual Dedicated
        Server). Dedicated servers could be partitioned to more virtual servers,
        when there is enough capacity of CPU, RAM, storage and the partitioning
        is allowed (you need to contact us, if you need to use this feature).


        **Used units (and value restrictions):**


        - `cpu` — GHz (greater than 3)

        - `ram` — GiB (greater than or equal to 2)

        - `primaryStorageSize` — GB

        - `primaryStorageLocation` — number of VDS's disk slot (see
        [https://documenter.getpostman.com/view/26076792/2s93CRJque#b5d554ff-1355-4ef0-bd71-2c8bb07ae465](https://documenter.getpostman.com/view/26076792/2s93CRJque#b5d554ff-1355-4ef0-bd71-2c8bb07ae465))

        - `operatingSystem` — OS identifier (see
        [https://documenter.getpostman.com/view/26076792/2s93CRJque#493137a1-9d6f-44b9-8209-911897af75d2](https://documenter.getpostman.com/view/26076792/2s93CRJque#493137a1-9d6f-44b9-8209-911897af75d2))

        - `ipAddress` — Ip address (optional, see
        [https://documenter.getpostman.com/view/26076792/2s93CRJque#da892cd7-e364-439d-9080-765f0cd1082c](https://documenter.getpostman.com/view/26076792/2s93CRJque#da892cd7-e364-439d-9080-765f0cd1082c))
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                cpu: 3000
                ram: 4
                primaryStorageSize: 10
                primaryStorageLocation: 1
                operatingSystem: vpsc
                serverName: Test server
      parameters:
        - name: serverHostname
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}

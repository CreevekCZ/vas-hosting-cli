  /api/v1/servers:
    get:
      tags:
        - Servers
      summary: Get list of servers
      description: >-
        Returns all active servers in customer's account.


        ## Filtering


        This endpoint supports an optional **filtering**.


        ### By label name


        You can filter servers by labels that were assigned to them before. This
        could be done using optional query parameter `labels[]`, which takes an
        array of label names. You can support one or many labels this way, but
        it always has to be specified like an array query parameter.


        **Correct usage:**


        - `labels[]=my-label` – Selects servers with label "my-label".

        - `labels[]=first&labels[]=second` – Selects servers with both "first"
        and "second" labels.
            

        **Wrong usage:**


        - ~`label=my-label`~ – The correct name of the query parameter is
        `labels[]`, even for single label.

        - ~`labels=my-label`~ – You need to provide query parameter as array
        always, even for single label.

        - ~`labels[]=first,second`~ – When specifying two labels, you need to
        insert `labels[]` query parameter twice. This example would select
        filters with label named "first,second".
      parameters:
        - name: labels[]
          in: query
          schema:
            type: string
          description: Optional query parameters for filtering by label name
          example: label-name
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}

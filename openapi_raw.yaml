openapi: 3.0.0
info:
  title: Vas-Hosting API
  description: >-
    Welcome to the VasHosting.cz API documentation! This API can be used for
    manipulating with servers, domains and all services related to domains (dns,
    emails, crons, etc.).


    Feel free to give us some feedback and things you think our API could do.


    ## Response formats


    Our api communicates only via JSON, we receive **JSON** body via the
    **POST** requests, and we provide back usually empty **204** response or
    response code **200** with **JSON** body if we need to provide you some
    information.


    Successfull responses: **200** (with json), **204** (empty body).  

    Error responses: **4xx** (with JSON, please read the "message" json key).


    You can see examples of correct requests (with successful responses) and bad
    requests (with error responses) under each endpoint's demo.


    ## Variables in URLs


    An example variable in url can be (your domain name) or (your server
    hostname), variables will tel us the context and they will setup the
    environment.


    ## Units


    As we provide hosting for your domains and offer managed VDSes/VPSes, too,
    we need to handle with various units for storage and operational memories.
    As hosting tariffs for domains are usually used for smaller projects, it
    works with smaller units (like kB and MB) as stored data isn't too big. On
    the other side, managed servers often works with bigger data in GB and TB.
    To deal with this asymmetry we decided to use two unit systems in this API.


    ### Domains (and related services)


    Everything around domains (includes all related services like databases, FTP
    or emails) uses **Megabytes (MB)** in endpoints of this API.


    When we need to count with bigger numbers, we always divide by **1,000**, so
    e.g. **1 GB = 1,000 MB**.


    ### Servers (VPS, VDS)


    When dealing with storage units and limitations around servers (VPSes and
    VDSes), always use **Gigabytes (GB)** for disk spaces and **Gibibytes
    (GiB)** for RAM size.


    When we need to save higher unit, for instance TB, we will divide bytes by
    1,000 for storage (server drives, etc.) and by 1,024 for RAM.


    ## Authorization


    Every your request needs to be authorized, authorization is done via **API
    keys**, they can be created here
    [https://portal.vas-hosting.cz/api-key](https://portal.vas-hosting.cz/api-key)
    and scope is currently unlimited, they will be displayed only once, since we
    are encrypting them and **we cannot show them again**, so please save them
    to some secure place.


    Authorizatin is done with http headers, header name is **X-API-Key** and the
    value is your api key.
  version: 1.0.0
servers:
  - url: undefined://{{url}}
components:
  securitySchemes:
    apikeyAuth:
      type: http
      scheme: apikey
security:
  - apikeyAuth: []
tags:
  - name: Account
  - name: Domains
    description: >-
      ## Units


      As we noted at the top of this API documentation, all units (maily around
      storage and its limitations) for domains and related services (everything
      in this section) are in **Megabytes (MB)**. As we count with jumping over
      content of this document, this information is repeated in all subsections.
  - name: Domains > Databases
    description: >-
      ## Units


      All API endpoints for databases uses **Megabytes (MB)** as storage size
      units.
  - name: Domains > DNS records
    description: >-
      This API endpoint is for creating, updating and deleting your DNS records.
      You can also access your NS records and change/delete them.
  - name: Domains > Email accounts
    description: >-
      When working with email accounts, always use only account name that is
      before **@yourdomain.com**, because domain name is always specified in the
      URL, if you are manipulating with email
      [test@yourdomain.com](https://mailto:test@yourdomain.com), url for
      changing password will look like this:


      ```

      https://centrum.vas-hosting.cz/api/v1/domains/yourdomain.com/email-accounts/test/change-password

       ```

      ## Units


      All API endpoints for emails uses **Megabytes (MB)** as storage size
      units.
  - name: Domains > Ftp accounts
    description: >-
      ## Units


      All API endpoints around FTP uses **Megabytes (MB)** as storage size
      units.
  - name: Servers
    description: >-
      ## Units


      Every numbers for defining storage sizes are in **Gigabytes (GB)**, RAM
      sizes are in **Gibibytes (GiB)**.
  - name: Servers > Labels
  - name: Servers > Operating systems
  - name: Servers > IP addresses

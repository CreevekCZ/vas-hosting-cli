          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - Domains > Databases
      summary: Create database
      description: |-
        | **JSON Parameter** | **Required** | **Description** |
        | --- | --- | --- |
        | name (string) | yes | Database name |
        | type (mysql/postgresql) | yes | Database software |
        | password (string 8-64) | yes | User password |
        | encoding (string) | no | MySQL/PostgreSQL encoding |
        | note (string) | no | Note |
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: foobar_5579
                type: mysql
                password: mytopsecretpassword
                encoding: utf8mb4_unicode_ci
                note: null
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: domain
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
